<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tap-Debug</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;margin:0;padding:20px;background:#111;color:#f5f5f5}
    .box{max-width:720px;margin:0 auto;background:#1b1b1b;border:1px solid #333;border-radius:16px;padding:16px}
    .status{padding:12px;border-radius:12px;background:#0d2a45;border:1px solid #285b87;margin-bottom:12px;word-break:break-word}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
    button,input{font:inherit}
    button{appearance:auto;-webkit-appearance:button;padding:14px 18px;border-radius:12px;border:1px solid #666;background:#fff;color:#000;min-height:48px}
    input{width:100%;padding:14px;border-radius:12px;border:1px solid #666;background:#fff;color:#000;box-sizing:border-box}
    .tapzone{margin-top:14px;padding:24px;border:2px dashed #666;border-radius:12px;min-height:120px;display:flex;align-items:center;justify-content:center;text-align:center}
    *{pointer-events:auto}
  </style>
</head>
<body>
  <div class="box">
    <div id="status" class="status">Status: JS gestartet.</div>
    <input id="testInput" type="text" placeholder="Tippe hier hinein" />
    <div class="row">
      <button id="btn1" type="button">Button 1</button>
      <button id="btn2" type="button">Button 2</button>
    </div>
    <div id="tapzone" class="tapzone">Tippe irgendwo in dieses Feld</div>
  </div>

  <script>
    const status = document.getElementById('status');
    const input = document.getElementById('testInput');
    const btn1 = document.getElementById('btn1');
    const btn2 = document.getElementById('btn2');
    const tapzone = document.getElementById('tapzone');

    function setStatus(msg){
      status.textContent = 'Status: ' + msg;
    }

    setStatus('JS gestartet und Listener gesetzt.');

    ['pointerdown','touchstart','click'].forEach(type => {
      document.addEventListener(type, function(ev){
        setStatus(type + ' auf ' + (ev.target.id || ev.target.tagName) + ' @ ' + Date.now());
      }, {passive:true});
    });

    btn1.onclick = () => setStatus('Button 1 onclick @ ' + Date.now());
    btn2.onclick = () => setStatus('Button 2 onclick @ ' + Date.now());
    input.addEventListener('focus', () => setStatus('Input Fokus @ ' + Date.now()));
    tapzone.addEventListener('click', () => setStatus('Tapzone click @ ' + Date.now()));
  </script>
</body>
</html>
