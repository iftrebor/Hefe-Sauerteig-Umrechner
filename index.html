<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d0f" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/bread-32.png" />
  <title>LM ↔ Hefe – Umrechner</title>
  <style>
    :root{--bg:#0b0d0f;--card:#121419;--muted:#9aa4b2;--fg:#eef2f6;--accent:#4ea1ff}
    @media (prefers-color-scheme: light){:root{--bg:#ffffff;--card:#f6f8fa;--muted:#57606a;--fg:#0f1720;--accent:#0969da}}
    html,body{background:var(--bg);color:var(--fg);margin:0;font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial;-webkit-text-size-adjust:100%}
    .wrap{max-width:980px;margin:0 auto;padding:calc(env(safe-area-inset-top,0) + 12px) 16px 24px}
    header{display:flex;align-items:center;gap:12px;padding:2px 0 10px}
    .logo{width:36px;height:36px;border-radius:10px;background:url('icons/bread-32.png') center/cover no-repeat;box-shadow:0 0 0 1px rgba(255,255,255,.08)}
    h1{font-size:1.18rem;margin:0}
    .muted{color:var(--muted)}
    .card{background:var(--card);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:14px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
    .debug{margin:0 0 10px;padding:8px 10px;border-radius:10px;background:rgba(78,161,255,.12);border:1px solid rgba(78,161,255,.35);font-size:.9rem}
    label{display:block;font-size:.92rem;margin:.35rem 0 .2rem;color:var(--muted)}
    input[type=number]{width:100%;padding:0.78rem 0.85rem;border:1px solid rgba(255,255,255,.18);border-radius:12px;background:transparent;color:var(--fg);font-size:17px;font-weight:600;box-sizing:border-box}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:760px){.grid{grid-template-columns:1fr 1fr}}
    .seg{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
    .seg .seg-btn{flex:1;text-align:center;padding:0.78rem;border-radius:12px;border:1px solid rgba(255,255,255,.18);cursor:pointer;user-select:none;appearance:none;background:transparent;color:var(--fg);font:inherit;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-width:0;position:relative;z-index:2}
    .seg .seg-btn[aria-pressed="true"], .seg .seg-btn[aria-selected="true"]{background:linear-gradient(180deg, rgba(78,161,255,.25), rgba(78,161,255,.05));border-color:rgba(78,161,255,.5)}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    button{appearance:none;border:0;border-radius:12px;padding:0.78rem 1rem;color:#0b0d0f;background:var(--accent);cursor:pointer;font:inherit;font-weight:700;touch-action:manipulation;-webkit-tap-highlight-color:transparent;position:relative;z-index:2}
    button.secondary{background:#30363d;color:#c9d1d9}
    .out{border:1px dashed rgba(255,255,255,.18);border-radius:12px;padding:.85rem .95rem;margin-top:.7rem}
    .kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    @media(min-width:820px){.kpi{grid-template-columns:repeat(4,1fr)}}
    .box{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:.7rem}
    .box h3{font-size:.92rem;margin:.1rem 0;color:var(--muted)}
    .val{font-size:1.25rem;font-weight:900}
    .hr{height:1px;background:rgba(255,255,255,.12);margin:.7rem 0}
    .small{font-size:.86rem}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo" aria-hidden="true"></div>
      <h1>Lievito Madre ↔ Hefe – Umrechner</h1>
    </header>

    <section class="card" aria-label="Eingaben">
      <div id="debug" class="debug">Debug: Seite geladen.</div>

      <div class="grid">
        <div>
          <label for="mehl">Gesamt‑Mehlmenge (g)</label>
          <input id="mehl" type="number" inputmode="decimal" min="1" step="1" value="1000" />
        </div>
        <div>
          <label for="temp">Teig‑Temperatur (°C)</label>
          <input id="temp" type="number" inputmode="decimal" min="10" max="35" step="1" value="23" />
          <div class="small muted" style="margin-top:6px">Schlanke Debug-Version ohne Slider, Q10, localStorage und Service-Worker-Logik.</div>
        </div>
      </div>

      <div class="seg" role="tablist" aria-label="Berechnungsmodus">
        <button type="button" class="seg-btn" id="tabA" role="tab" aria-selected="true" onclick="activateTab('A')">Rezept mit Hefe → LM</button>
        <button type="button" class="seg-btn" id="tabB" role="tab" aria-selected="false" onclick="activateTab('B')">LM vorgeben → Garzeit</button>
      </div>

      <div id="panelA" role="tabpanel" aria-labelledby="tabA">
        <div class="grid">
          <div>
            <label>Hefeart</label>
            <div class="seg" role="group" aria-label="Hefeart">
              <button type="button" id="btnDry" class="seg-btn" aria-pressed="true" onclick="setYeast('dry')">Trockenhefe</button>
              <button type="button" id="btnFresh" class="seg-btn" aria-pressed="false" onclick="setYeast('fresh')">Frischhefe</button>
            </div>
          </div>
          <div>
            <label for="hefeG">Hefemenge (g)</label>
            <input id="hefeG" type="number" inputmode="decimal" placeholder="z. B. 2" />
          </div>
        </div>
        <div class="actions">
          <button type="button" id="btnA" onclick="computeA()">Berechnen</button>
          <button type="button" class="secondary" onclick="resetA()">Reset</button>
          <button type="button" class="secondary" onclick="copyA()">Kopieren</button>
        </div>
        <div id="outA" class="out" style="display:none"></div>
      </div>

      <div id="panelB" role="tabpanel" aria-labelledby="tabB" hidden>
        <div class="grid">
          <div>
            <label for="lmG">LM‑Menge (g, 60 % Hydration)</label>
            <input id="lmG" type="number" inputmode="decimal" placeholder="z. B. 150" />
          </div>
          <div>
            <label>&nbsp;</label>
            <div class="muted small">LM% = LM (g) ÷ Mehl (g) × 100</div>
          </div>
        </div>
        <div class="actions">
          <button type="button" id="btnB" onclick="computeB()">Berechnen</button>
          <button type="button" class="secondary" onclick="resetB()">Reset</button>
          <button type="button" class="secondary" onclick="copyB()">Kopieren</button>
        </div>
        <div id="outB" class="out" style="display:none"></div>
      </div>
    </section>
  </div>

<script>
(function(){
  const $ = (id) => document.getElementById(id);
  const Q10 = 2.0;
  const baseT = 23.0;
  let yeastArt = 'dry';

  function debug(msg){
    $('#debug').textContent = 'Debug: ' + msg;
  }

  const knots = {
    times:[1,2,3,4.5,7,12,14,21],
    lmPct:[27,21,15,10.5,7.5,5,3.5,2.5],
    yPct:[0.9,0.7,0.5,0.35,0.25,0.15,0.08,0.05]
  };

  function linInterp(x,xs,ys){
    if(x<=xs[0]) return ys[0];
    if(x>=xs[xs.length-1]) return ys[ys.length-1];
    for(let i=0;i<xs.length-1;i++){
      const x0=xs[i], x1=xs[i+1];
      if(x>=x0 && x<=x1){
        const t=(x-x0)/(x1-x0);
        return ys[i]+t*(ys[i+1]-ys[i]);
      }
    }
    return ys[ys.length-1];
  }

  function timeFromLMpct(p){ return linInterp(p,[...knots.lmPct].reverse(),[...knots.times].reverse()); }
  function timeFromYeastPct(p){ return linInterp(p,[...knots.yPct].reverse(),[...knots.times].reverse()); }
  function lmPctFromTime(t){ return linInterp(t,knots.times,knots.lmPct); }
  function yeastPctFromTime(t){ return linInterp(t,knots.times,knots.yPct); }
  function scaleTime(t,T){ return t * Math.pow(Q10,(baseT - T)/10.0); }
  function fmtPct(v){ return (Math.round(v*100)/100).toFixed(2).replace('.', ',')+' %'; }
  function fmtG(v){ return (Math.round(v*10)/10).toFixed(1).replace('.', ',')+' g'; }
  function fmtH(v){ return (Math.round(v*10)/10).toFixed(1).replace('.', ',')+' h'; }

  window.activateTab = function(which){
    const isA = which === 'A';
    $('#tabA').setAttribute('aria-selected', String(isA));
    $('#tabB').setAttribute('aria-selected', String(!isA));
    $('#panelA').hidden = !isA;
    $('#panelB').hidden = isA;
    debug('Tab ' + which + ' geklickt.');
  };

  window.setYeast = function(art){
    yeastArt = art;
    const isDry = art === 'dry';
    $('#btnDry').setAttribute('aria-pressed', String(isDry));
    $('#btnFresh').setAttribute('aria-pressed', String(!isDry));
    debug('Hefeart: ' + (isDry ? 'Trockenhefe' : 'Frischhefe'));
  };

  window.computeA = function(){
    debug('Berechnen A geklickt.');
    const mehl = parseFloat($('#mehl').value);
    const hefeG = parseFloat($('#hefeG').value);
    const out = $('#outA');
    if(!(mehl > 0) || !(hefeG > 0)){
      out.style.display = 'none';
      debug('A: Eingaben fehlen.');
      return;
    }
    const dry = yeastArt === 'fresh' ? hefeG/3 : hefeG;
    const yPct = 100*dry/mehl;
    const time23 = timeFromYeastPct(yPct);
    const T = parseFloat($('#temp').value || baseT);
    const lmPct = lmPctFromTime(time23);
    const lmG = mehl*lmPct/100;
    const abM = lmG*0.625, abW = lmG*0.375;

    out.innerHTML = `
      <div class="kpi">
        <div class="box"><h3>Garzeit</h3><div class="val">${fmtH(scaleTime(time23,T))}</div></div>
        <div class="box"><h3>LM‑Einsatz</h3><div class="val">${fmtG(lmG)}</div></div>
        <div class="box"><h3>Weglassen Mehl</h3><div class="val">${fmtG(abM)}</div></div>
        <div class="box"><h3>Weglassen Wasser</h3><div class="val">${fmtG(abW)}</div></div>
      </div>
      <div class="hr"></div>
      <div class="small muted">LM‑Anteil: ${fmtPct(lmPct)}. Trockenhefe‑Äquivalent: ${fmtPct(yPct)}.</div>`;
    out.style.display = 'block';
  };

  window.computeB = function(){
    debug('Berechnen B geklickt.');
    const mehl = parseFloat($('#mehl').value);
    const lmG = parseFloat($('#lmG').value);
    const out = $('#outB');
    if(!(mehl > 0) || !(lmG > 0)){
      out.style.display = 'none';
      debug('B: Eingaben fehlen.');
      return;
    }
    const lmPct = 100*lmG/mehl;
    const time23 = timeFromLMpct(lmPct);
    const T = parseFloat($('#temp').value || baseT);
    const abM = lmG*0.625, abW = lmG*0.375;
    const yPct = yeastPctFromTime(time23);
    const yDry = yPct/100*mehl;

    out.innerHTML = `
      <div class="kpi">
        <div class="box"><h3>Garzeit</h3><div class="val">${fmtH(scaleTime(time23,T))}</div></div>
        <div class="box"><h3>Trockenhefe</h3><div class="val">${fmtG(yDry)}</div></div>
        <div class="box"><h3>Weglassen Mehl</h3><div class="val">${fmtG(abM)}</div></div>
        <div class="box"><h3>Weglassen Wasser</h3><div class="val">${fmtG(abW)}</div></div>
      </div>
      <div class="hr"></div>
      <div class="small muted">LM‑Anteil: ${fmtPct(lmPct)}. Trockenhefe‑Quote: ${fmtPct(yPct)}.</div>`;
    out.style.display = 'block';
  };

  window.resetA = function(){ $('#hefeG').value = ''; $('#outA').style.display = 'none'; debug('Reset A geklickt.'); };
  window.resetB = function(){ $('#lmG').value = ''; $('#outB').style.display = 'none'; debug('Reset B geklickt.'); };
  window.copyA = function(){ debug('Kopieren A geklickt.'); };
  window.copyB = function(){ debug('Kopieren B geklickt.'); };

  debug('JS initialisiert.');
})();
</script>
</body>
</html>
